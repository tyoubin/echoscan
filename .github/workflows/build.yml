name: Build macOS Universal

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build universal binary
        run: |
          swift build -c release --arch arm64 --build-path .build/arm64
          swift build -c release --arch x86_64 --build-path .build/x86_64
          ARM_BIN="$(/usr/bin/find .build/arm64 -type f -name echoscan -path '*/release/echoscan' | head -n 1)"
          X86_BIN="$(/usr/bin/find .build/x86_64 -type f -name echoscan -path '*/release/echoscan' | head -n 1)"
          if [ -z "$ARM_BIN" ] || [ -z "$X86_BIN" ]; then
            echo "Missing build outputs. arm64=$ARM_BIN x86_64=$X86_BIN"
            exit 1
          fi
          mkdir -p .build/universal
          lipo -create \
            "$ARM_BIN" \
            "$X86_BIN" \
            -output .build/universal/echoscan
          chmod +x .build/universal/echoscan

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: echoscan-macos-universal
          path: .build/universal/echoscan
          if-no-files-found: error
